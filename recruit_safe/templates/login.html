<!DOCTYPE html>
<html lang="en">
{% load static %}

<head>
  <meta charset="UTF-8">
  <title>Log In | RecruitSafe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      background-color: #ffffff;
      color: #000;
    }

    /* LEFT IMAGE */
    .left {
      width: 50%;
      background-color: #EEF2F7;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .left img {
      max-width: 90%;
      height: auto;
    }

    /* RIGHT SECTION */
    .right {
      width: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* CONTENT WRAPPER */
    .content {
      width: 380px;
      text-align: center;
    }

    /* HEADING */
    h1 {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #555;
      margin-bottom: 24px;
    }

    /* LOGIN BOX */
    .box {
      border: 1.5px solid #E5E7EB;
      border-radius: 18px;
      padding: 46px 38px;
      background: #ffffff;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
    }

    /* FORM */
    form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    input {
      padding: 14px 16px;
      border-radius: 12px;
      border: 1.5px solid #D1D5DB;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #2F80ED;
    }

    /* BUTTON */
    button {
      margin-top: 10px;
      padding: 14px;
      border-radius: 999px;
      border: none;
      background: #000;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    /* ERROR */
    .error {
      margin-top: 12px;
      font-size: 13px;
      color: red;
    }

    /* SECURITY NOTE */
    .secure-note {
      margin-top: 12px;
      font-size: 12px;
      color: #6B7280;
      text-align: center;
    }

    /* FOOTER */
    .footer {
      margin-top: 22px;
      font-size: 14px;
      color: #555;
    }

    .footer a {
      color: #000;
      font-weight: 600;
      text-decoration: none;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .left {
        display: none;
      }

      .right {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <!-- LEFT IMAGE -->
  <div class="left">
    <!-- <img src="../static/images/auth-illustration.png" alt="RecruitSafe Security"> -->
    <img src="{% static 'images/auth-illustration.png' %}">
  </div>

  <!-- RIGHT LOGIN -->
  <div class="right">
    <div class="content">

      <h1>Welcome Back</h1>
      <p class="subtitle">Log in to continue</p>

      <div class="box">
        <form method="POST">
          {% csrf_token %}
          <input type="text" name="username" placeholder="Username" required>
          <input type="password" name="password" placeholder="Password" required>
          <button type="submit">Log In</button>
          <!-- <p class="error" id="loginError"></p> -->
          {% if error %}
          <p class="error">{{ error }}</p>
          {% endif %}
        </form>

        <p class="secure-note">🔒 Your data is encrypted and secure</p>
      </div>

      <p class="footer">
        New user? <a href="/signup">Sign up</a>
      </p>

    </div>
  </div>


</body>

</html>
