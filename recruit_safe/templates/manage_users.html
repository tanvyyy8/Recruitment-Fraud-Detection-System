<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Manage Users | RecruitSafe</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#F7F8FA;
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#ffffff;
padding:30px 20px;
display:flex;
flex-direction:column;
margin:20px;
border-radius:28px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

.logo{
font-size:22px;
font-weight:800;
margin-bottom:40px;
}

.nav a{
display:block;
padding:12px 16px;
margin-bottom:8px;
border-radius:14px;
text-decoration:none;
color:#111;
font-weight:600;
}

.nav a.active,
.nav a:hover{
background:#F3F4F6;
}

/* MAIN */

.main{
flex:1;
padding:50px 40px 40px;
}

.page-title{
font-size:26px;
font-weight:800;
margin-bottom:20px;
}

/* TABLE */

.table-container{
background:#fff;
border-radius:16px;
padding:20px;
box-shadow:0 6px 16px rgba(0,0,0,0.06);
max-width: 1500px;      /* 🔥 thoda motha */
margin: 20px 0 20px 0;  /* 🔥 center kadha */
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#F3F4F6;
text-align:left;
padding:12px;
font-weight:700;
font-size:14px;
}

td{
padding:12px;
border-bottom:1px solid #eee;
font-size:14px;
}

/* ROLE BADGES */

.role-badge{
padding:4px 10px;
border-radius:999px;
font-size:11px;
font-weight:600;
}

.role-admin{
background:rgba(239,68,68,0.15);
color:#EF4444;
}

.role-user{
background:rgba(34,197,94,0.15);
color:#22C55E;
}

/* ACTION BUTTONS */

.action-btn{
padding:6px 12px;
border-radius:6px;
border:none;
cursor:pointer;
font-size:13px;
font-weight:600;
margin-right:6px;
}

.view-btn{
background:#000;
color:#fff;
}

.delete-btn{
background:#fff;
border:1px solid #D1D5DB;
}

.role-btn{
background:#2563EB;
color:#fff;
}

/* ================= DASHBOARD SIDEBAR STYLE ================= */

.sidebar .logo{
font-size:22px;
font-weight:800;
margin-bottom:40px;
padding-left:35px;
padding-top:8px;
}

.nav a{
display:block;
padding:12px 16px;
margin-bottom:8px;
border-radius:14px;
text-decoration:none;
color:#111;
font-weight:600;
font-size:14px;
}

.nav a.active,
.nav a:hover{
background:#F3F4F6;
}

.sidebar-footer{
margin-top:auto;
}

/* THEME TOGGLE */

.theme-toggle{
display:flex;
align-items:center;
gap:10px;
width:148px;
height:40px;
padding:4px 10px;
border-radius:999px;
background:#E5E7EB;
cursor:pointer;
transition:background 0.3s ease;
margin-left:10px;
margin-bottom:10px;
}

.toggle-circle{
width:32px;
height:32px;
border-radius:50%;
background:#ffffff;
display:flex;
align-items:center;
justify-content:center;
transition:transform 0.3s ease;
}

.toggle-text{
font-size:14px;
font-weight:600;
color:#111;
white-space:nowrap;
}

/* DARK MODE */

body.dark{
background:#020203;
color:#F5F5F7;
}

body.dark .sidebar{
background:#1f1e1e;
border:1px solid #26262E;
box-shadow:none;
}

body.dark .nav a{
color:#9CA3AF;
}

body.dark .nav a.active,
body.dark .nav a:hover{
background:#1C1C22;
color:#F5F5F7;
}

body.dark .theme-toggle{
background:#767676;
flex-direction:row-reverse;
}

body.dark .toggle-text{
color:#ffffff;
}
.nav a {
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav a i {
  width: 18px;
  height: 18px;
  color: #111;
}
</style>

</head>

<body>

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo">RecruitSafe</div>

<nav class="nav">

<a href="/dashboard" class="{% if request.path == '/dashboard' %}active{% endif %}">
  <i data-lucide="home"></i>
  Dashboard
</a>

<a href="/manage-users" class="{% if request.path == '/manage-users' %}active{% endif %}">
  <i data-lucide="users"></i>
  Manage Users
</a>

<a href="/analyze" class="{% if request.path == '/analyze' %}active{% endif %}">
  <i data-lucide="search"></i>
  Analyze Jobs
</a>

<a href="/history" class="{% if request.path == '/history' %}active{% endif %}">
  <i data-lucide="clock"></i>
  History
</a>

<a href="/settings" class="{% if request.path == '/settings' %}active{% endif %}">
  <i data-lucide="settings"></i>
  Settings
</a>

</nav>

<div class="sidebar-footer">

<div class="theme-toggle" onclick="toggleTheme()">

<div class="toggle-circle">

<svg id="sunIcon" xmlns="http://www.w3.org/2000/svg"
width="18" height="18"
viewBox="0 0 24 24" fill="none"
stroke="currentColor" stroke-width="2"
stroke-linecap="round" stroke-linejoin="round">

<circle cx="12" cy="12" r="5"/>
<line x1="12" y1="1" x2="12" y2="3"/>
<line x1="12" y1="21" x2="12" y2="23"/>
<line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
<line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
<line x1="1" y1="12" x2="3" y2="12"/>
<line x1="21" y1="12" x2="23" y2="12"/>
<line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
<line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>

</svg>

<svg id="moonIcon" xmlns="http://www.w3.org/2000/svg"
width="18" height="18"
viewBox="0 0 24 24" fill="none"
stroke="currentColor" stroke-width="2"
stroke-linecap="round" stroke-linejoin="round"
style="display:none">

<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>

</svg>

</div>

<span class="toggle-text" id="toggleText">Day mode</span>

</div>

</div>

</aside>


<!-- MAIN CONTENT -->

<div class="main">

<h2 class="page-title">Manage Users</h2>

<div class="table-container">

<table>

<thead>

<tr>
<th>User ID</th>
<th>Username</th>
<th>Total Analysis</th>
<th>Role</th>
<th>Actions</th>
</tr>
</thead>

<tbody>

{% for user in users %}

<tr>

<td>{{ user.id }}</td>

<td>{{ user.username }}</td>

<td>{{ user.analysis_count }}</td>

<td>

{% if user.role == "ADMIN" %}
<span class="role-badge role-admin">ADMIN</span>
{% else %}
<span class="role-badge role-user">USER</span>
{% endif %}

</td>

<td>

<a href="/dashboard?user_id={{ user.id }}">
  <button class="action-btn view-btn">View</button>
</a>

<button class="action-btn delete-btn"
onclick="deleteUser({{ user.id }})">
Delete
</button>

<button class="action-btn role-btn"
onclick="changeRole({{ user.id }})">
Change Role
</button>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

function deleteUser(id){

fetch(`/delete-user/${id}/`,{
method:"POST",
headers:{
"X-CSRFToken":getCSRFToken()
}
})
.then(res=>res.json())
.then(()=>{
location.reload()
})

}

function changeRole(id){

fetch(`/change-role/${id}/`,{
method:"POST",
headers:{
"X-CSRFToken":getCSRFToken()
}
})
.then(res=>res.json())
.then(()=>{
location.reload()
})

}

function getCSRFToken(){

let cookieValue=null;

const cookies=document.cookie.split(";");

for(let i=0;i<cookies.length;i++){

const cookie=cookies[i].trim();

if(cookie.startsWith("csrftoken=")){
cookieValue=cookie.substring(10);
}

}

return cookieValue;

}

</body>
</html>
